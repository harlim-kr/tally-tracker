<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1"/>
<title>탈리 트래커</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink:#3a3635;--ink2:#6b6460;--ink3:#a8a09c;
  --bg:#fffdf9;--bg2:#f5f0ea;--bg3:#efefec;
  --bd:#e8e0d8;--bd2:#d4c8be;
  --green:#8ed4b0;--red:#f0a898;
  --r:8px;--rl:12px;
}
body{background:#f0ebe3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--ink);min-height:100vh;}
.app{max-width:540px;margin:0 auto;padding:16px;}
.nav{display:flex;border-bottom:1px solid var(--bd);margin-bottom:18px;}
.nb{font-size:12px;letter-spacing:0.06em;padding:8px 14px;cursor:pointer;color:var(--ink3);border:none;border-bottom:2px solid transparent;margin-bottom:-1px;background:none;}
.nb.on{color:#5c4f47;border-bottom-color:#5c4f47;}
.page{display:none;}.page.on{display:block;}
.card{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);padding:16px 18px;margin-bottom:12px;}
.clabel{font-size:11px;letter-spacing:0.07em;color:var(--ink3);margin-bottom:10px;text-transform:uppercase;}
.goal-row{display:flex;gap:6px;align-items:baseline;padding:2px 0;}
.gperiod{font-size:11px;color:var(--ink3);min-width:40px;}
.gval{font-size:12px;color:var(--ink2);}
.gempty{font-size:12px;color:var(--ink3);font-style:italic;}
.tally-wrap{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;min-height:36px;}
.tally-group{display:inline-block;position:relative;}
.tstats{font-size:12px;color:var(--ink3);margin-top:8px;}
.todo-list{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
.todo-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border:0.5px solid var(--bd);border-radius:var(--r);background:var(--bg);cursor:grab;user-select:none;}
.todo-item:hover{background:var(--bg2);}
.todo-item.drag-over{border-color:var(--ink);}
.tchk{width:16px;height:16px;border:1px solid var(--bd2);border-radius:3px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.tchk:hover{border-color:var(--ink);}
.tbadge{font-size:11px;padding:2px 6px;border-radius:4px;background:var(--bg2);color:var(--ink3);}
.tbadge.thick{background:#faeeda;color:#633806;}
.add-row{display:flex;gap:6px;margin-top:8px;}
.add-row input{flex:1;font-size:13px;padding:7px 10px;border:0.5px solid var(--bd2);border-radius:var(--r);background:var(--bg);color:var(--ink);}
.btn{font-size:12px;padding:7px 12px;border:0.5px solid var(--bd2);border-radius:var(--r);background:transparent;cursor:pointer;color:var(--ink);font-family:inherit;white-space:nowrap;}
.btn:hover{background:var(--bg2);}
.btn-acc{background:#5c4f47;color:#fff;border-color:#5c4f47;}
.btn-acc:hover{opacity:0.85;background:#5c4f47;}
.divider{height:0.5px;background:var(--bd);margin:14px 0;}
.sinput{width:100%;font-size:13px;padding:7px 10px;border:0.5px solid var(--bd2);border-radius:var(--r);background:var(--bg);color:var(--ink);margin-bottom:8px;font-family:inherit;}
.erow{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:0.5px solid var(--bd);}
.erow:last-child{border-bottom:none;}
.etxt{font-size:13px;color:var(--ink);flex:1;}
.edot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.ebtn{width:30px;height:30px;border-radius:50%;border:1px solid var(--bd2);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;background:transparent;color:var(--ink);font-family:inherit;transition:all 0.1s;}
.ebtn.ap{background:var(--green);border-color:var(--green);color:#fff;}
.ebtn.am{background:var(--red);border-color:var(--red);color:#fff;}
.fe-item{display:flex;gap:6px;margin-bottom:6px;align-items:center;}
.fe-item input{flex:1;font-size:13px;padding:6px 10px;border:0.5px solid var(--bd2);border-radius:var(--r);background:var(--bg);color:var(--ink);font-family:inherit;}
.pmtog{display:flex;border:0.5px solid var(--bd2);border-radius:var(--r);overflow:hidden;}
.pmbtn{width:32px;height:32px;border:none;cursor:pointer;font-size:14px;background:transparent;color:var(--ink3);font-family:inherit;}
.pmbtn.ap{background:var(--green);color:#fff;}
.pmbtn.am{background:var(--red);color:#fff;}
.log-card{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);padding:14px 16px;margin-bottom:10px;}
.log-date{font-size:11px;color:var(--ink3);letter-spacing:0.06em;margin-bottom:8px;}
.log-marks{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;margin-bottom:6px;}
.log-wu{font-size:12px;color:var(--ink3);line-height:1.7;margin-top:4px;}
.mo-proj{margin-bottom:18px;}
.mo-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.mo-dot{width:9px;height:9px;border-radius:50%;}
.mo-lbl{font-size:12px;color:var(--ink2);}
.mo-marks{display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.25);display:flex;align-items:center;justify-content:center;z-index:200;}
.modal{background:var(--bg);border-radius:var(--rl);padding:20px;min-width:200px;box-shadow:0 4px 24px rgba(0,0,0,0.12);}
.modal-title{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:12px;}
.mopt{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r);cursor:pointer;font-size:13px;color:var(--ink);}
.mopt:hover{background:var(--bg2);}
.mdot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.tip{position:fixed;background:rgba(58,54,53,0.92);color:#fff;border-radius:8px;padding:7px 12px;font-size:12px;z-index:300;pointer-events:none;max-width:200px;line-height:1.6;white-space:pre-line;}
.set-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:13px;color:var(--ink);}
.toggle-btn{width:100%;display:flex;align-items:center;justify-content:space-between;background:none;border:none;cursor:pointer;font-family:inherit;padding:0;}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
<div class="app">
  <div class="nav">
    <button class="nb on" onclick="goPage('home')">홈</button>
    <button class="nb" onclick="goPage('log')">기록</button>
    <button class="nb" onclick="goPage('monthly')">월간</button>
    <button class="nb" onclick="goPage('settings')">설정</button>
  </div>

  <div id="page-home" class="page on">
    <!-- 날짜/스트릭 -->
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;">
      <div id="date-display" style="font-size:13px;color:var(--ink2);"></div>
      <div id="streak-display" style="font-size:11px;color:var(--ink3);"></div>
    </div>

    <!-- 목표+한마디 토글 -->
    <div class="card" style="padding:12px 16px;margin-bottom:12px;">
      <button class="toggle-btn" onclick="toggleTopPanel()">
        <span id="goals-summary" style="font-size:12px;color:var(--ink3);">목표 · 한마디</span>
        <span id="top-arrow" style="font-size:11px;color:var(--ink3);">▼</span>
      </button>
      <div id="top-panel" style="display:none;padding-top:10px;">
        <div id="goals-card"></div>
        <div style="margin-top:8px;padding-top:8px;border-top:0.5px solid var(--bd);">
          <div id="wdisp" style="font-family:Georgia,serif;font-size:14px;color:var(--ink);line-height:1.5;margin-bottom:6px;"></div>
          <button onclick="cycleWord()" style="font-size:11px;padding:3px 10px;border:0.5px solid var(--bd2);border-radius:99px;background:transparent;cursor:pointer;color:var(--ink3);font-family:inherit;">다음 문장</button>
        </div>
      </div>
    </div>

    <!-- 탈리마크 -->
    <div class="card">
      <!-- 범례 + 기상/취침 -->
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;gap:8px;">
        <div id="proj-legend" style="display:flex;gap:6px;flex-wrap:wrap;flex:1;"></div>
        <div style="display:flex;flex-direction:column;gap:4px;flex-shrink:0;">
          <button id="btn-wake" onclick="editSleep('wake')" style="font-size:11px;padding:3px 9px;border-radius:99px;border:1.5px solid var(--bd2);background:transparent;cursor:pointer;color:var(--ink3);font-family:inherit;white-space:nowrap;">기상</button>
          <button id="btn-sleep" onclick="editSleep('sleep')" style="font-size:11px;padding:3px 9px;border-radius:99px;border:1.5px solid var(--bd2);background:transparent;cursor:pointer;color:var(--ink3);font-family:inherit;white-space:nowrap;">취침</button>
        </div>
      </div>
      <!-- 좌우 탈리 -->
      <div style="display:flex;gap:16px;align-items:flex-start;">
        <div style="flex:1;min-width:0;">
          <div class="tally-wrap" id="tally-wrap-left"></div>
        </div>
        <div style="width:0.5px;background:var(--bd);align-self:stretch;"></div>
        <div style="flex:1;min-width:0;">
          <div class="tally-wrap" id="tally-wrap-right"></div>
        </div>
      </div>
      <div class="tstats" id="tstats">오늘 0번 · 0분</div>
    </div>

    <!-- 할일 -->
    <div class="card">
      <div class="todo-list" id="tlist"></div>
      <div class="add-row">
        <input id="ntodo" placeholder="할 일 추가 (! 붙이면 30분)" />
        <button class="btn" id="btn-todo">추가</button>
      </div>
    </div>

    <!-- 하루 마무리 토글 -->
    <div class="card" style="padding:0;overflow:hidden;">
      <button class="toggle-btn" onclick="toggleWrapUp()" style="padding:12px 16px;">
        <span style="font-size:13px;color:var(--ink2);">하루 마무리</span>
        <span id="wrapup-arrow" style="font-size:11px;color:var(--ink3);">▼</span>
      </button>
      <div id="wrapup-body" style="display:none;padding:0 16px 16px;">
        <p style="font-size:13px;color:var(--ink2);margin-bottom:12px;">오늘 찍은 항목에 에너지 +/- 표시</p>
        <div id="elist"></div>
        <div class="divider"></div>
        <div id="felist"></div>
        <button class="btn" style="margin-bottom:12px;" onclick="addFE()">+ 한 줄 추가</button>
        <div class="divider"></div>
        <input class="sinput" id="inp-learned" placeholder="마음에 든 점"/>
        <input class="sinput" id="inp-proud" placeholder="효과를 본 점"/>
        <input class="sinput" id="inp-tmr" placeholder="인정하는 점"/>
        <button class="btn btn-acc" onclick="saveWU()" style="width:100%;">마무리 저장</button>
      </div>
    </div>
  </div>

  <div id="page-log" class="page">
    <div class="card" style="margin-bottom:10px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <button onclick="changeWeek(-1)" style="font-size:18px;background:none;border:none;cursor:pointer;color:var(--ink2);padding:0 4px;">‹</button>
        <div id="week-label" style="font-size:12px;color:var(--ink2);"></div>
        <button onclick="changeWeek(1)" style="font-size:18px;background:none;border:none;cursor:pointer;color:var(--ink2);padding:0 4px;">›</button>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;align-items:center;">
        <div id="week-day-btns" style="display:flex;gap:5px;flex-wrap:wrap;flex:1;"></div>
        <button onclick="toggleChartAll()" id="btn-chart-all" style="font-size:11px;padding:3px 9px;border-radius:99px;border:1.5px solid var(--bd2);background:transparent;cursor:pointer;color:var(--ink3);font-family:inherit;white-space:nowrap;">전체</button>
      </div>
      <div style="position:relative;height:180px;">
        <canvas id="week-chart"></canvas>
      </div>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;" id="log-pstrip"></div>
    <div id="log-content"></div>
  </div>

  <div id="page-monthly" class="page">
    <div class="card" style="margin-bottom:10px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <button onclick="changeMonth(-1)" style="font-size:18px;background:none;border:none;cursor:pointer;color:var(--ink2);padding:0 4px;">‹</button>
        <div id="mo-label" style="font-size:13px;color:var(--ink2);font-weight:500;"></div>
        <button onclick="changeMonth(1)" style="font-size:18px;background:none;border:none;cursor:pointer;color:var(--ink2);padding:0 4px;">›</button>
      </div>
      <div id="mo-heatmap"></div>
    </div>
    <div class="card">
      <button class="toggle-btn" onclick="toggleMoContent()" style="margin-bottom:0;">
        <span class="clabel" style="margin-bottom:0;">프로젝트별 누적</span>
        <span id="mo-toggle-arrow" style="font-size:11px;color:var(--ink3);">▼</span>
      </button>
      <div id="mo-content" style="display:none;margin-top:12px;"></div>
    </div>
  </div>

  <div id="page-settings" class="page">
    <div class="card">
      <div class="clabel">오늘의 말</div>
      <div id="wmgr" style="margin-bottom:10px;"></div>
      <div class="add-row">
        <input id="nword" placeholder="새 문장 추가"/>
        <button class="btn" onclick="addWord()">추가</button>
      </div>
      <div class="divider"></div>
      <div class="clabel">목표</div>
      <input class="sinput" id="sg-month" placeholder="이달 목표"/>
      <input class="sinput" id="sg-week" placeholder="이번 주 목표"/>
      <input class="sinput" id="sg-today" placeholder="오늘 목표"/>
      <button class="btn btn-acc" onclick="saveGoals()">저장</button>
      <div class="divider"></div>
      <div class="clabel">프로젝트</div>
      <div id="pmgr" style="margin-bottom:10px;"></div>
      <div class="add-row">
        <input id="npname" placeholder="프로젝트 이름" style="flex:2;"/>
        <input type="color" id="npcolor" value="#8ed4b0" style="width:36px;height:36px;border:none;border-radius:4px;padding:2px;cursor:pointer;"/>
        <button class="btn" onclick="addProj()">추가</button>
      </div>
    </div>
  </div>
</div>

<div id="modal" class="modal-overlay" style="display:none;" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">프로젝트 선택</div>
    <div id="modal-opts"></div>
  </div>
</div>
<div id="tip" class="tip" style="display:none;"></div>

<script>
const TK=()=>new Date().toISOString().slice(0,10);
const MK=()=>new Date().toISOString().slice(0,7);
const RIGHT_PROJS=['링크닷 실험','닷슬래시 업무'];
const isRight=n=>RIGHT_PROJS.includes(n);

let S={
  words:["작게 시도하는 것이 안 하는 것보다 낫다.","오늘의 실험이 내일의 방향이다.","완벽하지 않아도 일단 그어라."],
  wi:0,
  goals:{month:'',week:'',today:''},
  projects:[
    {name:'AI/자동화',color:'#8ed4b0'},
    {name:'몸+돈',color:'#f0a8a8'},
    {name:'휴식',color:'#a8c8f0'},
    {name:'링크닷 실험',color:'#c4b8e8'},
    {name:'닷슬래시 업무',color:'#f0e8a8'}
  ],
  ap:0,
  tallies:{},
  todos:[],
  wrapUps:{},
  goalLog:{},
  sleep:{},
  nid:1,
  logP:-1,
  viewMonth:''
};
try{const d=localStorage.getItem('tally_v6');if(d)S=Object.assign({},S,JSON.parse(d));}catch(e){}
const sv=()=>{try{localStorage.setItem('tally_v6',JSON.stringify(S));}catch(e){}};

function goPage(p){
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('on'));
  document.querySelectorAll('.nb').forEach((b,i)=>{b.classList.toggle('on',['home','log','monthly','settings'][i]===p);});
  document.getElementById('page-'+p).classList.add('on');
  if(p==='log')renderLog();
  if(p==='monthly'){if(!S.viewMonth)S.viewMonth=MK();renderMonthly();}
  if(p==='settings')renderSettings();
}

function cycleWord(){
  S.wi=(S.wi+1)%S.words.length;
  document.getElementById('wdisp').textContent='"'+S.words[S.wi]+'"';
  sv();
}

function renderGoals(){
  const el=document.getElementById('goals-card');
  if(!el)return;
  const pairs=[['이달',S.goals.month],['이번 주',S.goals.week],['오늘',S.goals.today]];
  const rows=pairs.filter(([,v])=>v).map(([p,v])=>`<div class="goal-row"><span class="gperiod">${p}</span><span class="gval">${v}</span></div>`).join('');
  el.innerHTML=rows||'<div class="gempty">설정에서 목표를 입력해봐</div>';
  // 요약도 업데이트
  const sum=document.getElementById('goals-summary');
  if(sum) sum.textContent='목표 · 한마디';
}

function toggleTopPanel(){
  const p=document.getElementById('top-panel');
  const a=document.getElementById('top-arrow');
  const open=p.style.display==='none';
  p.style.display=open?'block':'none';
  a.textContent=open?'▲':'▼';
}

function toggleWrapUp(){
  const b=document.getElementById('wrapup-body');
  const a=document.getElementById('wrapup-arrow');
  const open=b.style.display==='none';
  b.style.display=open?'block':'none';
  a.textContent=open?'▲':'▼';
  if(open)renderElist();
}

function GT(){const k=TK();if(!S.tallies[k])S.tallies[k]=[];return S.tallies[k];}

function makeTallyGroupSVG(items,scale,onHover,onLeave,onClickStroke){
  const sc=scale||1;
  const W=Math.round(58*sc),H=Math.round(60*sc);
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('width',''+W);svg.setAttribute('height',''+H);
  svg.setAttribute('viewBox','0 0 58 60');
  const xPos=[9,19,29,39];
  items.forEach((h,j)=>{
    const p=S.projects.find(x=>x.name===h.proj)||S.projects[0];
    const sw=h.thick?3.2:2;
    const g=document.createElementNS('http://www.w3.org/2000/svg','g');
    g.style.cursor='pointer';
    const line=document.createElementNS('http://www.w3.org/2000/svg','line');
    if(j<4){
      line.setAttribute('x1',''+xPos[j]);line.setAttribute('y1','5');
      line.setAttribute('x2',''+xPos[j]);line.setAttribute('y2','55');
    } else {
      line.setAttribute('x1','3');line.setAttribute('y1','50');
      line.setAttribute('x2','53');line.setAttribute('y2','10');
    }
    line.setAttribute('stroke',p.color);
    line.setAttribute('stroke-width',''+sw);
    line.setAttribute('stroke-linecap','round');
    let hit;
    if(j<4){
      hit=document.createElementNS('http://www.w3.org/2000/svg','rect');
      hit.setAttribute('x',''+(xPos[j]-7));hit.setAttribute('y','0');
      hit.setAttribute('width','14');hit.setAttribute('height','60');
      hit.setAttribute('fill','transparent');
    } else {
      hit=document.createElementNS('http://www.w3.org/2000/svg','line');
      hit.setAttribute('x1','3');hit.setAttribute('y1','50');
      hit.setAttribute('x2','53');hit.setAttribute('y2','10');
      hit.setAttribute('stroke','transparent');
      hit.setAttribute('stroke-width','14');
      hit.setAttribute('stroke-linecap','round');
    }
    g.appendChild(line);g.appendChild(hit);
    if(onHover){
      g.addEventListener('mouseenter',e=>onHover(e,h,j));
      g.addEventListener('mouseleave',()=>{if(onLeave)onLeave();});
    }
    if(onClickStroke){
      g.addEventListener('click',e=>{e.stopPropagation();onClickStroke(h,j);});
    }
    svg.appendChild(g);
  });
  return svg;
}

function renderLegend(){
  const el=document.getElementById('proj-legend');
  if(!el)return;
  el.innerHTML='';
  S.projects.forEach((p,i)=>{
    const item=document.createElement('div');
    item.style.cssText='display:flex;align-items:center;gap:4px;cursor:pointer;padding:3px 8px;border-radius:99px;border:1.5px solid transparent;transition:all 0.1s;';
    if(i===S.ap)item.style.borderColor=p.color;
    const dot=document.createElement('div');
    dot.style.cssText='width:8px;height:8px;border-radius:50%;background:'+p.color+';flex-shrink:0;';
    const name=document.createElement('span');
    name.style.cssText='font-size:11px;color:var(--ink3);';
    name.textContent=p.name;
    item.appendChild(dot);item.appendChild(name);
    item.onclick=()=>{S.ap=i;renderLegend();};
    el.appendChild(item);
  });
}

function renderTallies(){
  const hs=GT();
  const elL=document.getElementById('tally-wrap-left');
  const elR=document.getElementById('tally-wrap-right');
  if(!elL||!elR)return;
  elL.innerHTML='';elR.innerHTML='';
  const hsL=hs.filter(h=>h&&!isRight(h.proj));
  const hsR=hs.filter(h=>h&&isRight(h.proj));

  function renderInto(el,hsArr,scale){
    const nFull=Math.floor(hsArr.length/5);
    const rem=hsArr.length%5;
    function makeGrp(items){
      const grp=document.createElement('div');
      grp.className='tally-group';
      grp.appendChild(makeTallyGroupSVG(items,scale,
        (e,h)=>{
          const pm=h.energy==='+'?'+ ':h.energy==='-'?'- ':'';
          showTip(e,pm+'['+h.proj+'] '+(h.note||'(설명없음)')+'\n클릭하면 삭제');
        },
        hideTip,
        (h)=>{
          const hs2=GT();const idx=hs2.indexOf(h);
          if(idx>-1){hs2.splice(idx,1);sv();renderTallies();renderElist();}
        }
      ));
      return grp;
    }
    for(let g=0;g<nFull;g++) el.appendChild(makeGrp(hsArr.slice(g*5,g*5+5)));
    if(rem>0) el.appendChild(makeGrp(hsArr.slice(nFull*5)));
  }

  renderInto(elL,hsL,2.04);
  renderInto(elR,hsR,1.0);

  const filled=hs.filter(h=>h);
  const mins=filled.reduce((a,h)=>a+(h.thick?30:20),0);
  document.getElementById('tstats').textContent='오늘 '+filled.length+'번 · '+mins+'분';
}

function renderTodos(){

    projDot.style.cssText='width:10px;height:10px;border-radius:50%;flex-shrink:0;cursor:pointer;border:1px solid var(--bd2);background:'+(tp?tp.color:'transparent')+';';
    projDot.onclick=e=>{e.stopPropagation();openModal(pi=>{S.todos[i].proj=S.projects[pi].name;sv();renderTodos();});};
    const txt=document.createElement('input');
    txt.type='text';txt.value=t.text;
    txt.style.cssText='border:none;background:transparent;outline:none;font-family:inherit;font-size:'+(i===0?'14px':'13px')+';font-weight:'+(i===0?'500':'400')+';color:var(--ink);flex:1;min-width:0;cursor:text;';
    let _saving=false;
    txt.addEventListener('change',()=>{if(!_saving){_saving=true;saveTodoText(i,txt.value);_saving=false;}});
    txt.addEventListener('keydown',e=>{
      if(e.key==='Enter'){
        e.preventDefault();e.stopPropagation();
        _saving=true;saveTodoText(i,txt.value);_saving=false;
        setTimeout(()=>document.getElementById('ntodo').focus(),30);
        return false;
      }
      if(e.key==='Tab'&&!e.shiftKey){
        e.preventDefault();
        const cur=S.todos[i]?S.todos[i].proj:'';
        const pidx=S.projects.findIndex(p=>p.name===cur);
        S.todos[i].proj=S.projects[(pidx+1)%S.projects.length].name;
        sv();renderTodos();
        setTimeout(()=>{const its=document.querySelectorAll('#tlist input[type=text]');if(its[i])its[i].focus();},30);
        return false;
      }
      if(e.key==='ArrowDown'){
        e.preventDefault();
        const its=document.querySelectorAll('#tlist input[type=text]');
        if(i<its.length-1)its[i+1].focus();
        else setTimeout(()=>document.getElementById('ntodo').focus(),30);
      }
      if(e.key==='ArrowUp'){
        e.preventDefault();
        const its=document.querySelectorAll('#tlist input[type=text]');
        if(i>0)its[i-1].focus();
      }
    });
    txt.addEventListener('click',e=>e.stopPropagation());
    const badge=document.createElement('div');badge.className='tbadge'+(t.thick?' thick':'');badge.textContent=t.thick?'30분':'20분';
    const del=document.createElement('button');del.className='btn';

    row.appendChild(chk);row.appendChild(projDot);row.appendChild(txt);row.appendChild(badge);row.appendChild(del);
    el.appendChild(row);
  });
}

let _chartFocusDay=null;
let _chartShowAll=true;
let _weekOffset=0;
function changeWeek(delta){
  _weekOffset+=delta;
  if(_weekOffset>0)_weekOffset=0;
  _chartFocusDay=null;
  renderWeekChart();
}
function toggleChartAll(){

  const btn=document.getElementById('btn-chart-all');

    btn.style.background=_chartShowAll?'var(--ink3)':'transparent';

  }

function renderWeekChart(){
  const dayNames=['일','월','화','수','목','금','토'];
  const colors=['#c4b8e8','#f0a8a8','#a8c8f0','#8ed4b0','#f0e8a8','#d4b8e8','#b8d4f0'];
  const btnEl=document.getElementById('week-day-btns');
  const keys=[];
  for(let i=6;i>=0;i--){
    const d=new Date();
    d.setDate(d.getDate()+_weekOffset-i);
    keys.push(d.toISOString().slice(0,10));
  }
  // 주간 레이블
  const wlabel=document.getElementById('week-label');
  if(wlabel)wlabel.textContent=keys[0].slice(5)+' ~ '+keys[6].slice(5)+(_weekOffset===0?' (이번 주)':'');
  if(btnEl){
    btnEl.innerHTML='';
    keys.forEach((k,idx)=>{
      const d=new Date(k+'T12:00:00');
      const dow=dayNames[d.getDay()];
      const btn=document.createElement('button');
      const isActive=_chartFocusDay===k;
      btn.style.cssText='font-size:11px;padding:3px 8px;border-radius:99px;border:1.5px solid '+colors[idx]+';cursor:pointer;font-family:inherit;transition:all 0.1s;background:'+(isActive?colors[idx]:'transparent')+';color:'+(isActive?'#fff':'var(--ink3)')+';';
      btn.textContent=dow+(idx===6?' (오늘)':'');
      btn.onclick=()=>{_chartFocusDay=isActive?null:k;renderWeekChart();};
      btnEl.appendChild(btn);
    });
  }
  const canvas=document.getElementById('week-chart');
  if(!canvas)return;
  if(canvas._chartInstance){canvas._chartInstance.destroy();canvas._chartInstance=null;}
  const datasets=[];
  const annotations=[];
  keys.forEach((k,idx)=>{
    const hs=(S.tallies[k]||[]).filter(h=>h);
    const isFaded=_chartFocusDay?_chartFocusDay!==k:false;
    if(!hs.length&&!(_chartFocusDay===k))return;
    const d=new Date(k+'T12:00:00');
    const dow=dayNames[d.getDay()];
    const pts=[];let cumMins=0;
    const sorted=[...hs].sort((a,b)=>new Date(a.time||k+'T12:00:00')-new Date(b.time||k+'T12:00:00'));
    sorted.forEach(h=>{
      const t=h.time?new Date(h.time):new Date(k+'T12:00:00');
      const hf=t.getHours()+t.getMinutes()/60;
      cumMins+=h.thick?30:20;
      pts.push({x:Math.round(hf*10)/10,y:cumMins});
    });
    if(!pts.length)return;
    datasets.push({
      label:k.slice(5)+' ('+dow+')',
      data:pts,
      borderColor:colors[idx],
      backgroundColor:'transparent',
      borderWidth:isFaded?1:2,
      pointRadius:isFaded?1:3,
      tension:0.3,
      borderDash:isFaded?[3,3]:[],
      opacity:isFaded?0.3:1
    });
    // 기상/취침 — 선 시작/끝에 마커 추가
    const sl=S.sleep&&S.sleep[k]?S.sleep[k]:{};
    if(sl.wake&&pts.length&&(!_chartFocusDay||_chartFocusDay===k)){
      const t=new Date(sl.wake);
      const hf=Math.round((t.getHours()+t.getMinutes()/60)*10)/10;
      pts.unshift({x:hf,y:0});
    }
    if(sl.sleep&&pts.length&&(!_chartFocusDay||_chartFocusDay===k)){
      const t=new Date(sl.sleep);
      const hf=Math.round((t.getHours()+t.getMinutes()/60)*10)/10;
      pts.push({x:hf,y:pts[pts.length-1].y});
    }
  });
  if(!datasets.length){
    const ctx=canvas.getContext('2d');
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#a8a09c';ctx.font='12px sans-serif';ctx.textAlign='center';
    ctx.fillText('탈리마크를 찍으면 여기에 그래프가 나타나요',canvas.width/2,80);
    return;
  }
  const ctx=canvas.getContext('2d');
  canvas._chartInstance=new Chart(ctx,{
    type:'line',
    data:{datasets},
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'nearest',intersect:false},
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{label:item=>item.dataset.label+': '+item.parsed.y+'분'}}
      },
      scales:{
        x:{type:'linear',min:0,max:24,ticks:{stepSize:3,callback:v=>v+'시',font:{size:10}},grid:{color:'rgba(0,0,0,0.04)'}},
        y:{beginAtZero:true,ticks:{callback:v=>v+'분',font:{size:10}},grid:{color:'rgba(0,0,0,0.04)'}}
      }
    }
  });
}

function renderMonthly(){
  if(!S.viewMonth)S.viewMonth=MK();
  const mk=S.viewMonth;
  const labelEl=document.getElementById('mo-label');
  if(labelEl)labelEl.textContent=mk.slice(0,4)+'년 '+parseInt(mk.slice(5,7))+'월';
  const heatEl=document.getElementById('mo-heatmap');
  if(heatEl){
    const year=parseInt(mk.slice(0,4)),month=parseInt(mk.slice(5,7))-1;
    const dim=new Date(year,month+1,0).getDate();
    const firstDay=new Date(year,month,1).getDay();
    heatEl.innerHTML='';
    const grid=document.createElement('div');
    grid.style.cssText='display:grid;grid-template-columns:repeat(7,1fr);gap:4px;';
    ['일','월','화','수','목','금','토'].forEach(d=>{
      const c=document.createElement('div');
      c.style.cssText='font-size:10px;color:var(--ink3);text-align:center;padding-bottom:4px;';
      c.textContent=d;grid.appendChild(c);
    });
    for(let i=0;i<firstDay;i++)grid.appendChild(document.createElement('div'));
    for(let d=1;d<=dim;d++){
      const dk=mk+'-'+String(d).padStart(2,'0');
      const count=(S.tallies[dk]||[]).filter(h=>h).length;
      const intensity=count===0?0:count===1?0.25:count<=3?0.5:count<=5?0.75:1;
      const isToday=dk===TK();
      const c=document.createElement('div');
      c.style.cssText='border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3px 0;background:rgba(180,160,220,'+intensity+');'+(isToday?'outline:2px solid #c4b8e8;outline-offset:1px;':'');
      const dn=document.createElement('div');
      dn.style.cssText='font-size:10px;color:'+(intensity>0.6?'#5a4a7a':intensity>0?'#8a78a0':'var(--ink3)')+';';
      dn.textContent=d;c.appendChild(dn);
      if(count>0){const cn=document.createElement('div');cn.style.cssText='font-size:9px;color:'+(intensity>0.5?'#7a5a9a':'var(--ink3)')+';';cn.textContent=count;c.appendChild(cn);}
      if(count>0)c.title=dk+' · '+count+'번';
      grid.appendChild(c);
    }
    heatEl.appendChild(grid);
  }
}

    const all=[];
    Object.keys(S.tallies).filter(k=>k.startsWith(mk)).forEach(k=>{
      (S.tallies[k]||[]).filter(h=>h&&h.proj===p.name).forEach(h=>all.push(h));
    });
    if(!all.length)return;any=true;
    const block=document.createElement('div');block.className='mo-proj';
    const header=document.createElement('div');header.className='mo-header';
    const dot=document.createElement('div');dot.className='mo-dot';dot.style.background=p.color;
    const lbl=document.createElement('div');lbl.className='mo-lbl';
    lbl.textContent=p.name+' — '+all.length+'번 · '+all.reduce((a,h)=>a+(h.thick?30:20),0)+'분';
    header.appendChild(dot);header.appendChild(lbl);
    const marks=document.createElement('div');marks.className='mo-marks';
    const ng=Math.ceil(all.length/5);
    for(let g=0;g<ng;g++){
      const grp=document.createElement('div');
      grp.appendChild(makeTallyGroupSVG(all.slice(g*5,g*5+5),0.65,
        (e,h)=>{const pm=h.energy==='+'?'+ ':h.energy==='-'?'- ':'';showTip(e,pm+(h.note||'(설명없음)'));},
        hideTip,null
      ));
      marks.appendChild(grp);
    }
    const moRow=document.createElement('div');moRow.style.cssText='display:flex;gap:12px;align-items:flex-start;';
    const moInfo=document.createElement('div');moInfo.style.cssText='flex:1;min-width:0;';
    all.forEach(h=>{
      const item=document.createElement('div');item.style.cssText='font-size:12px;color:var(--ink2);line-height:1.6;';
      const pm=h.energy==='+'?'+ ':h.energy==='-'?'- ':'· ';
      item.textContent=pm+(h.note||'(설명없음)');moInfo.appendChild(item);
    });
    moRow.appendChild(marks);moRow.appendChild(moInfo);
    block.appendChild(header);block.appendChild(moRow);el.appendChild(block);
  });
  if(!any)el.innerHTML='<p style="font-size:13px;color:var(--ink3);font-style:italic;">기록이 없어</p>';
}

function renderSettings(){
  document.getElementById('sg-month').value=S.goals.month;
  document.getElementById('sg-week').value=S.goals.week;
  document.getElementById('sg-today').value=S.goals.today;
  const wm=document.getElementById('wmgr');wm.innerHTML='';
  S.words.forEach((w,i)=>{
    const row=document.createElement('div');row.className='set-row';
    row.innerHTML=`<span style="flex:1;font-size:13px;">"${w}"</span><button class="btn" onclick="delWord(${i})">삭제</button>`;
    wm.appendChild(row);
  });
  const pm=document.getElementById('pmgr');pm.innerHTML='';
  S.projects.forEach((p,i)=>{
    const row=document.createElement('div');row.className='set-row';
    row.innerHTML=`<div style="width:10px;height:10px;border-radius:50%;background:${p.color};flex-shrink:0;"></div><span style="flex:1;">${p.name}</span><button class="btn" onclick="delProj(${i})">삭제</button>`;
    pm.appendChild(row);
  });
}

function saveGoals(){
  S.goals.month=document.getElementById('sg-month').value.trim();
  S.goals.week=document.getElementById('sg-week').value.trim();
  S.goals.today=document.getElementById('sg-today').value.trim();
  if(!S.goalLog)S.goalLog={};
  S.goalLog[TK()]={month:S.goals.month,week:S.goals.week,today:S.goals.today};
  sv();renderGoals();alert('저장됐어.');
}
function addWord(){const v=document.getElementById('nword').value.trim();if(!v)return;S.words.push(v);document.getElementById('nword').value='';sv();renderSettings();}
function delWord(i){S.words.splice(i,1);if(S.wi>=S.words.length)S.wi=0;sv();renderSettings();}
function addProj(){const n=document.getElementById('npname').value.trim(),c=document.getElementById('npcolor').value;if(!n)return;S.projects.push({name:n,color:c});document.getElementById('npname').value='';sv();renderSettings();renderLegend();}
function delProj(i){S.projects.splice(i,1);if(S.ap>=S.projects.length)S.ap=0;sv();renderSettings();renderLegend();}

function stampSleep(type){
  const k=TK();
  if(!S.sleep)S.sleep={};
  if(!S.sleep[k])S.sleep[k]={};
  S.sleep[k][type]=new Date().toISOString();
  sv();renderSleepButtons();
}
function editSleep(type){
  const k=TK();
  if(!S.sleep)S.sleep={};
  if(!S.sleep[k])S.sleep[k]={};
  const existing=S.sleep[k][type];
  if(!existing){
    // 첫 클릭 — 현재 시각 바로 기록
    S.sleep[k][type]=new Date().toISOString();
    sv();renderSleepButtons();
    return;
  }
  // 이미 찍혔으면 — time input으로 수정
  const btnId=type==='wake'?'btn-wake':'btn-sleep';
  const btn=document.getElementById(btnId);
  if(!btn)return;
  const t=new Date(existing);
  const defaultVal=String(t.getHours()).padStart(2,'0')+':'+String(t.getMinutes()).padStart(2,'0');
  const inp=document.createElement('input');
  inp.type='time';
  inp.value=defaultVal;
  inp.style.cssText='font-size:11px;padding:3px 6px;border-radius:99px;border:1.5px solid '+(type==='wake'?'#8ed4b0':'#a8c8f0')+';background:'+(type==='wake'?'#8ed4b0':'#a8c8f0')+';color:#fff;font-family:inherit;width:88px;';
  inp.onchange=()=>{
    const val=inp.value;if(!val)return;
    const [h,m]=val.split(':').map(Number);
    const d=new Date();d.setHours(h,m,0,0);
    S.sleep[k][type]=d.toISOString();
    sv();
    if(inp.parentNode)inp.parentNode.replaceChild(btn,inp);
    renderSleepButtons();
  };
  inp.onblur=()=>{setTimeout(()=>{if(inp.parentNode)inp.parentNode.replaceChild(btn,inp);renderSleepButtons();},150);};
  btn.parentNode.replaceChild(inp,btn);
  inp.focus();
}
function renderSleepButtons(){
  const k=TK();
  const data=S.sleep&&S.sleep[k]?S.sleep[k]:{};
  const wakeEl=document.getElementById('btn-wake');
  const sleepEl=document.getElementById('btn-sleep');
  if(wakeEl){
    if(data.wake){
      const t=new Date(data.wake);
      const h=t.getHours(),m=String(t.getMinutes()).padStart(2,'0');
      wakeEl.textContent='기상 '+h+':'+m;
      wakeEl.style.background='#8ed4b0';
      wakeEl.style.borderColor='#8ed4b0';
      wakeEl.style.color='#fff';
    } else {
      wakeEl.textContent='기상';
      wakeEl.style.background='transparent';
      wakeEl.style.borderColor='var(--bd2)';
      wakeEl.style.color='var(--ink3)';
    }
  }
  if(sleepEl){
    if(data.sleep){
      const t=new Date(data.sleep);
      const h=t.getHours(),m=String(t.getMinutes()).padStart(2,'0');
      sleepEl.textContent='취침 '+h+':'+m;
      sleepEl.style.background='#a8c8f0';
      sleepEl.style.borderColor='#a8c8f0';
      sleepEl.style.color='#fff';
    } else {
      sleepEl.textContent='취침';
      sleepEl.style.background='transparent';
      sleepEl.style.borderColor='var(--bd2)';
      sleepEl.style.color='var(--ink3)';
    }
  }
}
function renderDateStreak(){
  const el=document.getElementById('date-display');
  const sel=document.getElementById('streak-display');
  if(!el||!sel)return;
  const now=new Date();
  const days=['일','월','화','수','목','금','토'];
  el.textContent=now.getFullYear()+'.'+(now.getMonth()+1)+'.'+now.getDate()+' ('+days[now.getDay()]+')';
  let streak=0;const d=new Date();
  while(streak<365){
    const k=d.toISOString().slice(0,10);
    const has=(S.tallies[k]||[]).filter(h=>h).length>0;
    if(!has&&k!==TK())break;
    if(has)streak++;
    d.setDate(d.getDate()-1);
  }
  sel.textContent=streak>0?streak+'일째 기록 중':'';
}

let tipT;
function showTip(e,text){
  clearTimeout(tipT);
  const t=document.getElementById('tip');
  t.textContent=text;t.style.display='block';
  t.style.left=(e.clientX+12)+'px';
  t.style.top=(e.clientY-50)+'px';
}
function hideTip(){tipT=setTimeout(()=>{document.getElementById('tip').style.display='none';},120);}

// 저녁 6시 이후 하루마무리 자동 열기
if(new Date().getHours()>=18){
  document.getElementById('wrapup-body').style.display='block';
  document.getElementById('wrapup-arrow').textContent='▲';
}

// ntodo 이벤트
(function(){
  function execAddTodo(){
    const inp=document.getElementById('ntodo');
    if(!inp)return;
    const txt=inp.value.trim();
    inp.value='';
    if(!txt)return;
    const thick=txt.startsWith('!');
    S.todos.push({id:S.nid++,text:thick?txt.slice(1).trim():txt,thick});
    sv();renderTodos();
    setTimeout(()=>inp.focus(),30);
  }
  const ntodoEl=document.getElementById('ntodo');
  const btnTodo=document.getElementById('btn-todo');
  if(ntodoEl){
    ntodoEl.addEventListener('keydown',function(e){
      if(e.key==='Enter'){e.preventDefault();e.stopPropagation();execAddTodo();}
      if(e.key==='ArrowUp'||(e.key==='Tab'&&e.shiftKey)){
        e.preventDefault();
        const items=document.querySelectorAll('#tlist input[type=text]');
        if(items.length>0)items[items.length-1].focus();
      }
    });
  }
  if(btnTodo)btnTodo.addEventListener('click',function(e){e.preventDefault();execAddTodo();});
})();

S.viewMonth=MK();
if(!S.sleep)S.sleep={};
renderSleepButtons();
document.getElementById('wdisp').textContent='"'+S.words[S.wi]+'"';
renderDateStreak();
renderGoals();
renderLegend();
renderTallies();
renderTodos();
renderElist();
</script>
